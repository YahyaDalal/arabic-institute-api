name: Django CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  lint:
    runs-on: ubuntu-latest
    name: Lint & Code Quality

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flake8 black isort

      - name: Run flake8
        run: flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        continue-on-error: true

      - name: Check code formatting with black
        run: black --check . 2>/dev/null || true
        continue-on-error: true

      - name: Check import sorting with isort
        run: isort --check-only . 2>/dev/null || true
        continue-on-error: true

  test:
    runs-on: ubuntu-latest
    name: Run Tests
    needs: lint

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: test_arabic_institute
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Cache pip dependencies
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install coverage pytest pytest-django pytest-cov

      - name: Run Django checks
        env:
          SECRET_KEY: test-secret-key-for-ci-only
          DEBUG: 'True'
          DB_NAME: test_arabic_institute
          DB_USER: postgres
          DB_PASSWORD: postgres
          DB_HOST: localhost
          DB_PORT: '5432'
          SENDGRID_API_KEY: test
          DEFAULT_FROM_EMAIL: test@test.com
          CLOUDINARY_CLOUD_NAME: test
          CLOUDINARY_API_KEY: test
          CLOUDINARY_API_SECRET: test
        run: python manage.py check

      - name: Run migrations
        env:
          SECRET_KEY: test-secret-key-for-ci-only
          DEBUG: 'True'
          DB_NAME: test_arabic_institute
          DB_USER: postgres
          DB_PASSWORD: postgres
          DB_HOST: localhost
          DB_PORT: '5432'
          SENDGRID_API_KEY: test
          DEFAULT_FROM_EMAIL: test@test.com
          CLOUDINARY_CLOUD_NAME: test
          CLOUDINARY_API_KEY: test
          CLOUDINARY_API_SECRET: test
        run: python manage.py migrate

      - name: Run tests with coverage
        env:
          SECRET_KEY: test-secret-key-for-ci-only
          DEBUG: 'True'
          DB_NAME: test_arabic_institute
          DB_USER: postgres
          DB_PASSWORD: postgres
          DB_HOST: localhost
          DB_PORT: '5432'
          SENDGRID_API_KEY: test
          DEFAULT_FROM_EMAIL: test@test.com
          CLOUDINARY_CLOUD_NAME: test
          CLOUDINARY_API_KEY: test
          CLOUDINARY_API_SECRET: test
        run: |
          coverage run --source='.' manage.py test
          coverage report
          coverage xml

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          file: ./coverage.xml
          flags: unittests
          fail_ci_if_error: false

  security:
    runs-on: ubuntu-latest
    name: Security Checks
    needs: lint

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install bandit safety

      - name: Run Bandit security checks
        run: bandit -r . -ll --skip B101,B601 2>/dev/null || true
        continue-on-error: true

      - name: Check for known vulnerabilities
        run: safety check --json 2>/dev/null || true
        continue-on-error: true

  build:
    runs-on: ubuntu-latest
    name: Build & Package
    needs: [test, security]
    if: success()

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Verify build integrity
        run: python manage.py collectstatic --noinput --dry-run
        env:
          SECRET_KEY: test-secret-key-for-ci-only
          DEBUG: 'False'
          DB_NAME: test_arabic_institute
          DB_USER: postgres
          DB_PASSWORD: postgres
          DB_HOST: localhost
          DB_PORT: '5432'
          SENDGRID_API_KEY: test
          DEFAULT_FROM_EMAIL: test@test.com
          CLOUDINARY_CLOUD_NAME: test
          CLOUDINARY_API_KEY: test
          CLOUDINARY_API_SECRET: test
